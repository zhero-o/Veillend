name: Soroban CI

on:
  push:
    branches:
      - main
    paths:
      - "veilend-soroban/**"
      - ".github/workflows/soroban-ci.yml"
  pull_request:
    paths:
      - "veilend-soroban/**"
      - ".github/workflows/soroban-ci.yml"
  workflow_dispatch:

concurrency:
  group: soroban-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  soroban-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: veilend-soroban

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown, wasm32v1-none

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            veilend-soroban -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --locked

      - name: Build release wasm
        run: cargo build --locked --target wasm32-unknown-unknown --release

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Build Soroban contract artifact
        run: stellar contract build
